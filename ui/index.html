<!DOCTYPE html>
<html>
<head>
    <title>AI Inbox Intelligence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>⚡ AI Inbox Intelligence</h1>
    <p class="subtitle">Smart Email Classification using AI</p>

    <div id="email-box">
        <h3 id="subject">Subject will appear here</h3>
        <p id="email-text">Click "Next Email" to begin</p>
        <p><strong>Sender:</strong> <span id="sender">---</span></p>
    </div>

    <button onclick="nextEmail()">Next Email</button>

    <div id="result">
        <h2 id="prediction"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
